version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: indexall-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: indexall
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: indexall-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - /opt/bot_database.db:/opt/bot_database.db:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: indexall-frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env.production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: indexall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads_data:
