version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: indexall-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: indexall
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: indexall-backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - ../backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - /opt/bot_database.db:/opt/bot_database.db:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: indexall-frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env.production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: indexall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: indexall-certbot
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  uploads_data:
  certbot-certs:
    external: true
    name: indexall_certbot-certs
  certbot-webroot:
    external: true
    name: indexall_certbot-webroot
