events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP → HTTPS redirect (indexall)
    server {
        listen 80;
        server_name indexall.nkubot.ru;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # service.indexall.ru — HTTP (ACME challenge + redirect to HTTPS)
    server {
        listen 80;
        server_name service.indexall.ru;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # altayprimetransfer.ru — HTTP (ACME challenge + redirect to HTTPS)
    server {
        listen 80;
        server_name altayprimetransfer.ru www.altayprimetransfer.ru;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://altayprimetransfer.ru$request_uri;
        }
    }

    # altayprimetransfer.ru — HTTPS (landing page)
    server {
        listen 443 ssl;
        server_name altayprimetransfer.ru www.altayprimetransfer.ru;

        ssl_certificate     /etc/letsencrypt/live/altayprimetransfer.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/altayprimetransfer.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/landing;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # HTTPS — indexall.nkubot.ru
    server {
        listen 443 ssl;
        server_name indexall.nkubot.ru;

        ssl_certificate     /etc/letsencrypt/live/indexall.nkubot.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/indexall.nkubot.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /api {
            proxy_pass         http://host.docker.internal:4000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS — service.indexall.ru (same app, own SSL cert)
    server {
        listen 443 ssl;
        server_name service.indexall.ru;

        ssl_certificate     /etc/letsencrypt/live/service.indexall.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/service.indexall.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /api {
            proxy_pass         http://host.docker.internal:4000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
