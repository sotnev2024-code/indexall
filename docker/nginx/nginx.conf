events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name nkubot.ru www.nkubot.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — API (api.nkubot.ru → backend:4000)
    server {
        listen 443 ssl;
        server_name api.nkubot.ru;

        ssl_certificate     /etc/letsencrypt/live/nkubot.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nkubot.ru/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS — Frontend (nkubot.ru → frontend:3000)
    server {
        listen 443 ssl;
        server_name nkubot.ru www.nkubot.ru;

        ssl_certificate     /etc/letsencrypt/live/nkubot.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nkubot.ru/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
